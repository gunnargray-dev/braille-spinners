<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Async Agents v2 — Workspace</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/theme.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    em, i, cite, dfn, var, address { font-style: normal !important; }
    * { font-variation-settings: 'ital' 0, 'slnt' 0; }

    body {
      font-family: var(--font-body);
      letter-spacing: -0.01em;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* =============================================
       WORKSPACE LAYOUT
       ============================================= */
    .workspace {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      overflow: hidden;
    }

    /* --- Left Sidebar --- */
    .sidebar {
      width: 200px;
      min-width: 200px;
      display: flex;
      flex-direction: column;
      background: transparent;
      overflow: hidden;
    }
    .sidebar-menu-bar {
      display: flex;
      align-items: center;
      padding: 0.5rem 0.75rem;
    }
    .sidebar-menu-bar .menu-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      padding: 0;
      transition: border-color 0.15s ease;
    }
    .sidebar-menu-bar .menu-btn:hover { border-color: var(--text-muted); }
    .sidebar-menu-bar .menu-btn svg {
      width: 16px; height: 16px;
      stroke: var(--text-muted); fill: none;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    }
    .sidebar-menu-bar .menu-dropdown {
      position: absolute;
      top: calc(100% + 0.25rem);
      left: 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.35rem;
      display: flex;
      flex-direction: column;
      min-width: 180px;
      opacity: 0;
      transform: translateY(-4px);
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      z-index: 100;
    }
    .sidebar-menu-bar .menu-dropdown.open {
      opacity: 1; transform: translateY(0); pointer-events: auto;
    }
    .sidebar-menu-bar .menu-dropdown a {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      padding: 0.5rem 0.65rem;
      border-radius: 6px;
      transition: background 0.12s ease, color 0.12s ease;
    }
    .sidebar-menu-bar .menu-dropdown a:hover {
      background: var(--surface-raised);
      color: var(--text);
    }
    .sidebar-nav {
      display: flex;
      flex-direction: column;
      padding: 0.5rem 0.65rem;
      gap: 0.1rem;
    }
    .sidebar-nav-item {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.55rem 0.75rem;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 450;
      letter-spacing: -0.01em;
      transition: color 0.15s ease, background 0.15s ease;
      border-radius: 8px;
      width: 100%;
      text-align: left;
    }
    .sidebar-nav-item:hover {
      color: var(--text-secondary);
      background: var(--surface-raised);
    }
    .sidebar-nav-item.active {
      color: var(--text);
      background: var(--surface-raised);
    }
    .sidebar-nav-item svg {
      width: 18px; height: 18px;
      stroke: currentColor; fill: none;
      stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
      flex-shrink: 0;
    }

    /* Sidebar panels (skills, sources) */
    .sidebar-panel {
      flex: 1;
      overflow: hidden;
      display: none;
      flex-direction: column;
    }
    .sidebar-panel.visible { display: flex; }
    #panel-skills, #panel-sources {
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding-bottom: 1rem;
    }
    #panel-skills::-webkit-scrollbar, #panel-sources::-webkit-scrollbar { display: none; }
    .sidebar-panel-header {
      padding: 1rem 1.15rem 0.6rem;
      font-size: 0.62rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }
    .panel-item {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.5rem 1.15rem;
      cursor: default;
      transition: background 0.12s ease;
    }
    .panel-item:hover { background: rgba(255,255,255,0.02); }
    .panel-item-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 0.85rem;
    }
    .panel-item-body {
      flex: 1; min-width: 0;
    }
    .panel-item-name {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.3;
    }
    .panel-item-desc {
      font-size: 0.62rem;
      color: var(--text-muted);
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .panel-item-badge {
      font-size: 0.55rem;
      font-weight: 600;
      padding: 0.12rem 0.4rem;
      border-radius: 3px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .panel-item-badge.active { color: var(--green-text); background: var(--green-bg); }
    .panel-item-badge.available { color: var(--text-muted); background: var(--muted-bg); }
    .panel-item-badge.connected { color: var(--green-text); background: var(--green-bg); }
    .panel-item-badge.disconnected { color: var(--text-muted); background: var(--muted-bg); }
    .panel-divider {
      display: none;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 1.15rem;
    }
    .sidebar-title {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }
    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .sidebar-list::-webkit-scrollbar { display: none; }

    /* Project groups */
    .project-group {
    }
    .project-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.15rem;
      cursor: pointer;
      transition: background 0.12s ease;
      user-select: none;
    }
    .project-header:hover { background: var(--surface-raised); }
    .project-folder-icon {
      width: 15px; height: 15px;
      stroke: var(--text-muted); fill: none;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
      flex-shrink: 0;
      transition: stroke 0.15s ease;
    }
    .project-group:not(.collapsed) .project-folder-icon {
      stroke: var(--text-secondary);
    }
    .project-name {
      font-size: 0.78rem;
      font-weight: 550;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .project-tasks {
      overflow: hidden;
      transition: max-height 0.25s ease;
    }
    .project-group.collapsed .project-tasks {
      max-height: 0 !important;
    }

    /* Task rows */
    .task-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 1rem 0.5rem 1.75rem;
      cursor: pointer;
      transition: background 0.12s ease;
      border-left: 2px solid transparent;
    }
    .task-row:hover { background: rgba(255,255,255,0.02); }
    .task-row.active {
      background: var(--bg-soft);
      border-left-color: var(--accent);
    }
    .task-status-icon {
      width: 16px; height: 16px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .task-status-icon .spinner-char {
      font-size: 0.72rem;
      color: var(--blue);
    }
    .task-status-icon .check-icon {
      font-size: 0.68rem;
      color: var(--green);
    }
    .task-status-icon .queued-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      border: 1.5px solid var(--text-muted);
    }
    .task-status-icon .new-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--purple);
    }
    .task-row-body {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .task-row-name {
      font-size: 0.72rem;
      font-weight: 450;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }
    .task-row.active .task-row-name { color: var(--text); }

    .sidebar-section-label {
      padding: 0.75rem 1rem 0.35rem;
      font-size: 0.58rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }

    /* Project landing view — two column */
    .project-landing {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .project-landing-inner {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;
      padding: 2rem 2rem 2rem;
    }
    .project-landing-inner::-webkit-scrollbar { display: none; }
    .project-landing-header {
      margin-bottom: 1.25rem;
    }
    .project-landing-header h1 {
      font-size: 1.15rem;
      font-weight: 650;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 0.1rem;
    }
    .project-landing-count {
      font-size: 0.68rem;
      color: var(--text-muted);
    }
    .project-landing-cols {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 1.5rem;
      align-items: start;
    }

    /* Left column — queries */
    .pl-col-label {
      font-size: 0.58rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }
    .project-landing-tasks {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }
    .pl-task {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.55rem 0.75rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.12s ease;
    }
    .pl-task:hover { background: var(--surface-raised); }
    .pl-task-icon {
      width: 16px; height: 16px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .pl-task-icon .spinner-char { font-size: 0.72rem; color: var(--blue); }
    .pl-task-icon .check-icon { font-size: 0.68rem; color: var(--green); }
    .pl-task-icon .queued-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      border: 1.5px solid var(--text-muted);
    }
    .pl-task-icon .new-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--purple);
    }
    .pl-task-body { flex: 1; min-width: 0; }
    .pl-task-name {
      font-size: 0.82rem;
      font-weight: 450;
      color: var(--text);
      line-height: 1.3;
    }
    .pl-task-meta {
      font-size: 0.58rem;
      color: var(--text-muted);
      margin-top: 0.08rem;
    }
    .pl-empty {
      padding: 1.5rem 0.75rem;
      color: var(--text-muted);
      font-size: 0.72rem;
    }

    /* Inbox-style task rows (global tasks view) */
    .pl-inbox-list {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }
    .pl-inbox-item {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.12s ease;
    }
    .pl-inbox-item:hover { background: var(--surface-raised); }
    .pl-inbox-item-icon {
      width: 16px; height: 16px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .pl-inbox-item-icon .spinner-char { font-size: 0.72rem; color: var(--blue); }
    .pl-inbox-item-icon .check-icon { font-size: 0.68rem; color: var(--green); }
    .pl-inbox-item-icon .queued-dot { width: 7px; height: 7px; border-radius: 50%; border: 1.5px solid var(--text-muted); }
    .pl-inbox-item-body {
      flex: 1; min-width: 0;
    }
    .pl-inbox-item-name {
      font-size: 0.82rem;
      font-weight: 450;
      color: var(--text);
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pl-inbox-item-meta {
      font-size: 0.58rem;
      color: var(--text-muted);
      margin-top: 0.08rem;
      display: flex;
      gap: 0.35rem;
      align-items: center;
    }
    .pl-inbox-item-preview {
      display: flex;
      gap: 0.35rem;
      flex-shrink: 0;
    }
    .pl-inbox-artifact {
      height: 32px;
      width: 48px;
      border-radius: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.5rem;
      font-weight: 600;
      color: var(--text-muted);
      overflow: hidden;
      flex-shrink: 0;
    }
    .pl-inbox-artifact.type-doc { border-left: 2px solid var(--blue); }
    .pl-inbox-artifact.type-slides { border-left: 2px solid var(--yellow); }
    .pl-inbox-artifact.type-spreadsheet { border-left: 2px solid var(--green); }
    .pl-inbox-artifact.type-website { border-left: 2px solid var(--accent); }

    /* Inbox header bar */
    .pl-inbox-toolbar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    .pl-inbox-toolbar-left {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex: 1;
    }
    .pl-inbox-filter {
      font-size: 0.62rem;
      font-weight: 500;
      color: var(--text-muted);
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.3rem 0.55rem;
      cursor: pointer;
      font-family: var(--font-body);
      transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
    }
    .pl-inbox-filter:hover {
      border-color: var(--text-muted);
      color: var(--text-secondary);
    }
    .pl-inbox-filter.active {
      background: var(--accent-bg-subtle);
      border-color: color-mix(in srgb, var(--accent) 30%, transparent);
      color: var(--accent);
    }
    .pl-inbox-overflow {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: 1px solid var(--border);
      border-radius: 6px; cursor: pointer;
      color: var(--text-muted);
      transition: border-color 0.15s ease, color 0.15s ease;
      flex-shrink: 0;
    }
    .pl-inbox-overflow:hover {
      border-color: var(--text-muted);
      color: var(--text-secondary);
    }
    .pl-inbox-overflow svg {
      width: 14px; height: 14px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    /* Project pill in inbox rows */
    .pl-inbox-project-pill {
      font-size: 0.52rem;
      font-weight: 550;
      color: var(--text-muted);
      background: var(--muted-bg);
      padding: 0.12rem 0.4rem;
      border-radius: 4px;
      white-space: nowrap;
      letter-spacing: 0.02em;
    }

    /* Right column — files */
    .pl-files-section {
      margin-bottom: 1rem;
    }
    .pl-files-section:last-child { margin-bottom: 0; }
    .pl-file {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.4rem 0.5rem;
      border-radius: 6px;
      cursor: default;
      transition: background 0.12s ease;
    }
    .pl-file:hover { background: var(--surface-raised); }
    .pl-file-icon {
      width: 28px; height: 28px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 0.7rem;
    }
    .pl-file-icon.pdf { background: rgba(220,105,115,0.12); }
    .pl-file-icon.spreadsheet { background: rgba(83,158,85,0.12); }
    .pl-file-icon.doc { background: rgba(96,165,250,0.12); }
    .pl-file-icon.slides { background: rgba(213,113,65,0.12); }
    .pl-file-icon.website { background: rgba(78,153,163,0.12); }
    .pl-file-icon.archive { background: rgba(176,124,212,0.12); }
    .pl-file-body { flex: 1; min-width: 0; }
    .pl-file-name {
      font-size: 0.68rem;
      font-weight: 450;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }
    .pl-file-size {
      font-size: 0.55rem;
      color: var(--text-muted);
    }
    .pl-files-empty {
      font-size: 0.65rem;
      color: var(--text-muted);
      padding: 0.5rem;
    }
    .pl-upload-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      padding: 0.4rem;
      margin-top: 0.35rem;
      font-size: 0.62rem;
      font-weight: 500;
      color: var(--text-muted);
      background: none;
      border: 1px dashed var(--border);
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      font-family: var(--font-body);
      transition: border-color 0.15s ease, color 0.15s ease;
    }
    .pl-upload-btn:hover {
      border-color: var(--text-muted);
      color: var(--text-secondary);
    }
    .pl-upload-btn svg {
      width: 12px; height: 12px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    /* Dashboard widgets */
    .pl-widgets {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.65rem;
      margin-bottom: 1.5rem;
    }
    .pl-widget {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    .pl-widget:hover {
      border-color: var(--text-muted);
      background: var(--surface-raised);
    }
    .pl-widget-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }
    .pl-widget-title {
      font-size: 0.62rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }
    .pl-widget-badge {
      font-size: 0.5rem;
      font-weight: 600;
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }
    .pl-widget-badge.live {
      color: var(--green);
      background: var(--green-bg);
    }
    .pl-widget-badge.live::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--green);
      animation: livePulse 2s ease-in-out infinite;
    }
    @keyframes livePulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    .pl-widget-badge.scheduled {
      color: var(--text-muted);
      background: var(--muted-bg);
    }
    .pl-widget-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .pl-widget-sub {
      font-size: 0.58rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
    }
    .pl-widget-change {
      font-weight: 600;
    }
    .pl-widget-change.up { color: var(--green); }
    .pl-widget-change.down { color: var(--red); }

    /* Sparkline */
    .pl-sparkline {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 32px;
      margin-top: 0.5rem;
    }
    .pl-spark-bar {
      flex: 1;
      border-radius: 2px 2px 0 0;
      min-height: 2px;
      transition: height 0.3s ease;
    }

    /* Activity log widget */
    .pl-widget-log {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      margin-top: 0.15rem;
    }
    .pl-log-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.6rem;
    }
    .pl-log-time {
      font-family: var(--font-mono);
      font-size: 0.55rem;
      color: var(--text-muted);
      min-width: 38px;
      flex-shrink: 0;
    }
    .pl-log-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .pl-log-text {
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Ticker widget */
    .pl-ticker-list {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      margin-top: 0.15rem;
    }
    .pl-ticker-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.62rem;
    }
    .pl-ticker-name {
      font-weight: 550;
      color: var(--text);
      min-width: 45px;
    }
    .pl-ticker-bar-wrap {
      flex: 1;
      height: 4px;
      background: var(--border-subtle);
      border-radius: 2px;
      overflow: hidden;
    }
    .pl-ticker-bar {
      height: 100%;
      border-radius: 2px;
    }
    .pl-ticker-val {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      color: var(--text-muted);
      min-width: 32px;
      text-align: right;
    }

    /* Donut chart widget */
    .pl-donut-wrap {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 0.35rem;
    }
    .pl-donut {
      width: 72px; height: 72px;
      flex-shrink: 0;
      position: relative;
    }
    .pl-donut svg {
      width: 100%; height: 100%;
      transform: rotate(-90deg);
    }
    .pl-donut circle {
      fill: none;
      stroke-width: 6;
      cx: 36; cy: 36; r: 30;
    }
    .pl-donut-center {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .pl-donut-legend {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      flex: 1;
      min-width: 0;
    }
    .pl-donut-legend-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.58rem;
      color: var(--text-secondary);
    }
    .pl-donut-legend-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .pl-donut-legend-val {
      margin-left: auto;
      font-family: var(--font-mono);
      font-size: 0.55rem;
      color: var(--text-muted);
    }

    /* Area sparkline */
    .pl-area-chart {
      height: 48px;
      margin-top: 0.4rem;
      position: relative;
    }
    .pl-area-chart svg {
      width: 100%;
      height: 100%;
    }

    /* Heatmap grid */
    .pl-heatmap {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 2px;
      margin-top: 0.4rem;
    }
    .pl-heatmap-cell {
      aspect-ratio: 1;
      border-radius: 2px;
      position: relative;
    }
    .pl-heatmap-cell::after {
      content: attr(data-label);
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.4rem;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
    }
    .pl-heatmap-labels {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 2px;
      margin-top: 1px;
    }
    .pl-heatmap-label {
      font-size: 0.4rem;
      color: var(--text-muted);
      text-align: center;
    }

    /* Mini bar chart (horizontal) */
    .pl-mini-bars {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      margin-top: 0.25rem;
    }
    .pl-mini-bar-row {
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }
    .pl-mini-bar-label {
      font-size: 0.55rem;
      color: var(--text-muted);
      min-width: 22px;
      text-align: right;
      font-family: var(--font-mono);
    }
    .pl-mini-bar-track {
      flex: 1;
      height: 12px;
      background: var(--border-subtle);
      border-radius: 3px;
      overflow: hidden;
      display: flex;
    }
    .pl-mini-bar-seg {
      height: 100%;
      transition: width 0.4s ease;
    }
    .pl-mini-bar-val {
      font-size: 0.55rem;
      font-family: var(--font-mono);
      color: var(--text-secondary);
      min-width: 28px;
    }

    /* Project landing suggestions */
    .pl-suggestions {
      display: flex;
      gap: 0.35rem;
      overflow: hidden;
      margin-bottom: 0.5rem;
    }
    .pl-suggestions:empty { display: none; }
    .pl-suggestion {
      font-size: 0.65rem;
      font-weight: 450;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.4rem 0.7rem;
      cursor: pointer;
      transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
      font-family: var(--font-body);
      white-space: nowrap;
    }
    .pl-suggestion:hover {
      border-color: var(--text-muted);
      color: var(--text-secondary);
      background: var(--surface-raised);
    }

    /* Project landing input */
    .project-landing-input {
      padding: 1.5rem 2rem 0.85rem;
      background: linear-gradient(to bottom, transparent, var(--surface) 40%);
      position: relative;
      margin-top: -1rem;
      z-index: 5;
    }
    .project-landing-input-inner {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.55rem 0.65rem 0.55rem 1rem;
      width: 100%;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .project-landing-input-inner:focus-within {
      border-color: var(--border-base);
      box-shadow: 0 0 0 1px var(--border-soft);
    }
    .project-landing-input-field {
      flex: 1;
      background: none; border: none;
      font-family: var(--font-body);
      font-size: 0.82rem;
      color: var(--text);
      outline: none;
      letter-spacing: -0.01em;
    }
    .project-landing-input-field::placeholder { color: var(--text-muted); }
    .project-landing-send {
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      background: var(--text); border: none; border-radius: 50%;
      cursor: pointer; transition: opacity 0.15s ease; flex-shrink: 0;
    }
    .project-landing-send:hover { opacity: 0.8; }
    .project-landing-send svg {
      width: 14px; height: 14px;
      stroke: var(--bg); fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    /* Sidebar footer actions */
    .sidebar-footer {
      padding: 0.65rem 1rem;
      display: flex;
      gap: 0.4rem;
    }
    .sidebar-action {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      padding: 0.45rem 0;
      font-size: 0.68rem;
      font-weight: 500;
      color: var(--text-muted);
      background: none;
      border: 1px solid var(--border);
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.12s ease, color 0.12s ease, border-color 0.12s ease;
      font-family: var(--font-body);
    }
    .sidebar-action:hover {
      background: var(--surface-raised);
      color: var(--text-secondary);
      border-color: var(--text-muted);
    }
    .sidebar-action svg {
      width: 13px; height: 13px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    /* Modal form controls */
    .composer-field {
      margin-bottom: 1rem;
    }
    .composer-label {
      font-size: 0.62rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
    }
    .composer-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.55rem 0.75rem;
      font-family: var(--font-body);
      font-size: 0.8rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s ease;
    }
    .composer-input::placeholder { color: var(--text-muted); }
    .composer-input:focus { border-color: var(--text-muted); }
    .composer-btn {
      padding: 0.5rem 1.1rem;
      border-radius: 7px;
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.12s ease, background 0.12s ease;
      border: none;
    }
    .composer-btn.primary {
      background: var(--green);
      color: #fff;
    }
    .composer-btn.primary:hover { opacity: 0.85; }
    .composer-btn.secondary {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }
    .composer-btn.secondary:hover { background: var(--surface-raised); }

    /* New project modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      width: 340px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
      transform: translateY(8px);
      transition: transform 0.2s ease;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-title {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 1rem;
    }
    .modal-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
      margin-top: 1rem;
    }

    /* --- Main Pane (right) --- */
    .main-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--surface);
      margin: 0.35rem 0.35rem 0.35rem 0;
      border-radius: 14px;
      border: 1px solid var(--border);
    }

    /* Tab bar */
    .tab-bar {
      display: flex;
      align-items: stretch;
      border-bottom: 1px solid var(--border-subtle);
      background: var(--surface);
      min-height: 36px;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0 0.85rem;
      font-size: 0.68rem;
      font-weight: 450;
      color: var(--text-muted);
      border-right: 1px solid var(--border-subtle);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s ease, color 0.12s ease;
      position: relative;
    }
    .tab-item:hover { background: var(--surface-raised); color: var(--text-secondary); }
    .tab-item.active {
      color: var(--text);
      background: var(--bg);
    }
    .tab-item.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0; right: 0;
      height: 1px;
      background: var(--bg);
    }
    .tab-close {
      width: 14px; height: 14px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 3px;
      opacity: 0;
      transition: opacity 0.12s ease, background 0.12s ease;
      font-size: 0.6rem;
      color: var(--text-muted);
    }
    .tab-item:hover .tab-close,
    .tab-item.active .tab-close { opacity: 1; }
    .tab-close:hover { background: var(--muted-bg); color: var(--text); }
    .tab-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .tab-dot.running { background: var(--blue); }
    .tab-dot.completed { background: var(--green); }
    .tab-dot.queued { background: var(--text-muted); }
    .tab-dot.new { background: var(--purple); }

    /* Conversation thread */
    .conversation {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding: 1.5rem 0 2rem;
    }
    .conversation::-webkit-scrollbar { display: none; }

    .msg {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* User message */
    .msg-user {
      margin-bottom: 1.5rem;
    }
    .msg-user-label {
      font-size: 0.6rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.35rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .msg-user-avatar {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.5rem; font-weight: 700; color: #fff;
    }
    .msg-user-text {
      font-size: 0.92rem;
      color: var(--text);
      line-height: 1.65;
      font-weight: 450;
    }

    /* Agent Group (CoT) — ported from asi-async.html */
    .agent-group {
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .agent-group.visible { opacity: 1; transform: translateY(0); }
    .agent-group.completed { opacity: 0.45; transition: opacity 0.5s ease; }
    .agent-group-header {
      display: flex; align-items: center; gap: 0.45rem;
      padding: 0.5rem 0; font-size: 0.82rem; cursor: pointer; position: relative;
    }
    .ag-spinner-wrap {
      width: 16px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: opacity 0.3s ease;
    }
    .ag-check {
      color: var(--green); font-weight: 600; font-size: 0.78rem;
      width: 16px; text-align: center; flex-shrink: 0;
      opacity: 0; position: absolute; transition: opacity 0.3s ease;
    }
    .agent-group.completed .ag-check { opacity: 1; position: static; }
    .agent-group.completed .ag-spinner-wrap { opacity: 0; width: 0; overflow: hidden; }
    .ag-label { font-weight: 600; color: var(--text); }
    .agent-group.visible:not(.completed) .ag-label {
      background: linear-gradient(90deg,
        var(--text) 0%, var(--text) 35%,
        var(--text-muted) 50%,
        var(--text) 65%, var(--text) 100%);
      background-size: 300% 100%;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: textShimmer 2.4s linear infinite;
    }
    .agent-group.completed .ag-label {
      background: none; -webkit-text-fill-color: var(--text); animation: none;
    }
    @keyframes textShimmer {
      0% { background-position: 200% 50%; }
      100% { background-position: -100% 50%; }
    }
    .ag-task {
      color: var(--text-muted); flex: 1; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .ag-chevron {
      width: 12px; height: 12px; stroke: var(--text-muted); fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      flex-shrink: 0; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .agent-group.expanded .ag-chevron { transform: rotate(90deg); }

    .agent-group-body {
      margin-left: 7px; padding-left: 1rem;
      border-left: 1px solid var(--border);
      display: grid; grid-template-rows: 0fr; opacity: 0;
      transition: grid-template-rows 0.4s ease, opacity 0.35s ease, padding 0.4s ease;
      padding-top: 0; padding-bottom: 0;
    }
    .agent-group-body-inner { overflow: hidden; }
    .agent-group.expanded .agent-group-body {
      grid-template-rows: 1fr; opacity: 1;
      padding-top: 0.15rem; padding-bottom: 0.4rem;
    }
    .agent-group.completed .agent-group-body { opacity: 0.5; }

    .ag-step {
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.2rem 0; font-size: 0.75rem;
      opacity: 0; transition: opacity 0.3s ease; position: relative;
    }
    .ag-step.visible { opacity: 1; }
    .ag-step.completed { opacity: 0.5; }
    .ag-step-spinner-wrap {
      width: 14px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: opacity 0.3s ease;
    }
    .ag-step-check {
      color: var(--green); font-weight: 600; font-size: 0.72rem;
      width: 14px; text-align: center; flex-shrink: 0;
      opacity: 0; position: absolute; transition: opacity 0.3s ease;
    }
    .ag-step.completed .ag-step-check { opacity: 1; position: static; }
    .ag-step.completed .ag-step-spinner-wrap { opacity: 0; width: 0; overflow: hidden; }
    .ag-step-text { font-family: var(--font-mono); color: var(--text-muted); }

    /* Assistant message */
    .msg-assistant {
      margin-bottom: 1.5rem;
    }
    .msg-assistant-label {
      font-size: 0.6rem;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.4rem;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }
    .msg-assistant-text {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.8;
    }
    .msg-assistant-text p { margin-bottom: 0.65rem; }
    .msg-assistant-text p:last-child { margin-bottom: 0; }
    .msg-assistant-text strong { color: var(--text); font-weight: 600; }
    .msg-assistant-text ul {
      padding-left: 1.2rem;
      margin-bottom: 0.65rem;
    }
    .msg-assistant-text li {
      margin-bottom: 0.35rem;
      font-size: 0.85rem;
      line-height: 1.7;
    }
    .msg-assistant-text li::marker {
      color: var(--text-muted);
    }

    /* Source cards */
    .msg-sources {
      margin-bottom: 1.5rem;
    }
    .sources-label {
      font-size: 0.6rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }
    .sources-label svg {
      width: 12px; height: 12px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
    .sources-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }
    .source-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.65rem 0.85rem;
      transition: border-color 0.15s ease, background 0.15s ease;
      cursor: pointer;
    }
    .source-card:hover {
      border-color: var(--text-muted);
      background: color-mix(in srgb, var(--surface) 80%, var(--bg));
    }
    .source-card-header {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      margin-bottom: 0.3rem;
    }
    .source-card-favicon {
      width: 14px; height: 14px;
      border-radius: 3px;
      background: var(--surface-raised);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.5rem;
      flex-shrink: 0;
    }
    .source-card-title {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .source-card-url {
      font-size: 0.58rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 0.3rem;
    }
    .source-card-snippet {
      font-size: 0.65rem;
      color: var(--text-muted);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Artifact card */
    .msg-artifact {
      margin-bottom: 1.5rem;
    }
    .artifact-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.15s ease;
      cursor: pointer;
    }
    .artifact-card:hover { border-color: var(--text-muted); }
    .artifact-header {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.7rem 0.95rem;
      border-bottom: 1px solid var(--border-subtle);
    }
    .artifact-icon-wrap {
      width: 28px; height: 28px;
      border-radius: 6px;
      background: var(--accent-bg-subtle);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .artifact-icon {
      width: 14px; height: 14px;
      stroke: var(--accent); fill: none;
      stroke-width: 1.8;
    }
    .artifact-meta { flex: 1; min-width: 0; }
    .artifact-title {
      font-size: 0.75rem;
      font-weight: 550;
      color: var(--text);
      line-height: 1.3;
    }
    .artifact-subtitle {
      font-size: 0.6rem;
      color: var(--text-muted);
      margin-top: 0.05rem;
    }
    .artifact-open-btn {
      font-size: 0.62rem;
      font-weight: 500;
      color: var(--text-muted);
      padding: 0.25rem 0.55rem;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: none;
      cursor: pointer;
      transition: color 0.15s ease, border-color 0.15s ease;
      flex-shrink: 0;
    }
    .artifact-open-btn:hover {
      color: var(--text-secondary);
      border-color: var(--text-muted);
    }
    .artifact-preview {
      padding: 0.85rem 1rem;
      font-family: var(--font-mono);
      font-size: 0.64rem;
      color: var(--text-muted);
      line-height: 1.65;
      max-height: 220px;
      overflow-y: auto;
      white-space: pre;
      scrollbar-width: none;
      position: relative;
    }
    .artifact-preview::-webkit-scrollbar { display: none; }
    .artifact-fade {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 40px;
      background: linear-gradient(to top, var(--surface) 10%, transparent);
      pointer-events: none;
    }

    /* =============================================
       VIEW TOGGLE
       ============================================= */
    .view-toggle-bar {
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border-subtle);
      background: var(--surface);
      min-height: 36px;
      padding: 0 0.75rem;
      gap: 0.5rem;
      border-radius: 13px 13px 0 0;
    }
    .view-toggle {
      display: inline-flex;
      background: var(--surface-raised);
      border-radius: 6px;
      padding: 2px;
      gap: 2px;
    }
    .view-toggle-btn {
      padding: 0.3rem 0.7rem;
      font-size: 0.65rem;
      font-weight: 550;
      font-family: var(--font-body);
      letter-spacing: 0.01em;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      color: var(--text-muted);
      background: none;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .view-toggle-btn:hover { color: var(--text-secondary); }
    .view-toggle-btn.active {
      background: var(--border);
      color: var(--text);
    }
    .back-to-project {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 0.68rem;
      font-weight: 500;
      cursor: pointer;
      padding: 0.3rem 0.5rem;
      border-radius: 6px;
      transition: color 0.15s ease, background 0.15s ease;
      margin-right: 0.25rem;
    }
    .back-to-project:hover {
      color: var(--text-secondary);
      background: var(--surface-raised);
    }
    .back-to-project svg {
      width: 14px; height: 14px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
    .view-toggle-spacer { flex: 1; }

    /* =============================================
       CANVAS VIEW — Artifact Workspace
       ============================================= */
    .canvas-view {
      flex: 1;
      position: relative;
      overflow: hidden;
      display: none;
      flex-direction: column;
    }
    .canvas-view.visible { display: flex; }

    /* Artifact toolbar */
    .artifact-toolbar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border-bottom: 1px solid var(--border-subtle);
      background: var(--surface);
      min-height: 40px;
    }
    .artifact-toolbar-title {
      font-size: 0.75rem;
      font-weight: 550;
      color: var(--text);
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .artifact-toolbar-type {
      font-size: 0.58rem;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--muted-bg);
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .artifact-toolbar-actions {
      display: flex;
      gap: 2px;
    }
    .artifact-toolbar-btn {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none;
      color: var(--text-muted); cursor: pointer;
      border-radius: 5px;
      transition: background 0.12s ease, color 0.12s ease;
    }
    .artifact-toolbar-btn:hover {
      background: var(--surface-raised);
      color: var(--text-secondary);
    }
    .artifact-toolbar-btn svg {
      width: 14px; height: 14px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
    .artifact-toolbar-divider {
      width: 1px;
      height: 16px;
      background: var(--border);
      margin: 0 0.25rem;
    }
    .artifact-toolbar-version {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }
    .artifact-toolbar-version-btn {
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: 1px solid var(--border);
      color: var(--text-muted); cursor: pointer;
      border-radius: 5px;
      font-size: 0.7rem;
      transition: background 0.12s ease, color 0.12s ease;
    }
    .artifact-toolbar-version-btn:hover {
      background: var(--surface-raised); color: var(--text-secondary);
    }
    .artifact-toolbar-version-btn:disabled {
      opacity: 0.3; cursor: default;
    }
    .artifact-toolbar-version-label {
      font-size: 0.6rem;
      font-weight: 500;
      color: var(--text-muted);
      font-family: var(--font-mono);
      min-width: 32px;
      text-align: center;
    }

    /* Artifact rendering area */
    .artifact-workspace {
      flex: 1;
      overflow: auto;
      scrollbar-width: none;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2.5rem 2rem 3rem;
      background: var(--bg);
      background-image:
        radial-gradient(circle at 50% 0%, color-mix(in srgb, var(--surface) 30%, transparent) 0%, transparent 50%);
    }
    .artifact-workspace::-webkit-scrollbar { display: none; }

    /* Document artifact */
    .artifact-doc {
      width: 100%;
      max-width: 680px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2.75rem 3rem 3.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08), 0 8px 40px rgba(0,0,0,0.18);
      min-height: 500px;
    }
    .artifact-doc h1 {
      font-size: 1.4rem;
      font-weight: 650;
      color: var(--text);
      letter-spacing: -0.03em;
      line-height: 1.3;
      margin-bottom: 0.35rem;
    }
    .artifact-doc .doc-subtitle {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 1.75rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border-subtle);
    }
    .artifact-doc h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
      margin: 1.5rem 0 0.5rem;
    }
    .artifact-doc h3 {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin: 1.1rem 0 0.4rem;
    }
    .artifact-doc p {
      font-size: 0.82rem;
      color: var(--text-secondary);
      line-height: 1.75;
      margin-bottom: 0.65rem;
    }
    .artifact-doc ul, .artifact-doc ol {
      padding-left: 1.25rem;
      margin-bottom: 0.75rem;
    }
    .artifact-doc li {
      font-size: 0.82rem;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 0.3rem;
    }
    .artifact-doc li::marker { color: var(--text-muted); }
    .artifact-doc strong { color: var(--text); font-weight: 600; }
    .artifact-doc em { color: var(--text-muted); font-style: normal; }
    .artifact-doc .doc-table {
      width: 100%;
      border-collapse: collapse;
      margin: 0.85rem 0 1.25rem;
      font-size: 0.75rem;
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      overflow: hidden;
    }
    .artifact-doc .doc-table th {
      text-align: left;
      font-weight: 600;
      color: var(--text);
      padding: 0.55rem 0.75rem;
      background: var(--bg-soft);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .artifact-doc .doc-table td {
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--border-subtle);
      color: var(--text-secondary);
    }
    .artifact-doc .doc-table tr:last-child td { border-bottom: none; }
    .artifact-doc .doc-table tbody tr:nth-child(even) td { background: color-mix(in srgb, var(--bg-soft) 50%, transparent); }
    .artifact-doc .doc-table tr:hover td { background: var(--accent-bg-subtle); }
    .artifact-doc .doc-callout {
      padding: 0.85rem 1.1rem;
      border-left: 3px solid var(--accent);
      background: var(--accent-bg-subtle);
      border-radius: 0 10px 10px 0;
      margin: 1rem 0;
      font-size: 0.78rem;
      color: var(--text-secondary);
      line-height: 1.7;
    }
    .artifact-doc .doc-stat-row {
      display: flex;
      gap: 0.75rem;
      margin: 1.25rem 0 1.5rem;
    }
    .artifact-doc .doc-stat {
      flex: 1;
      background: var(--bg-soft);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      text-align: center;
    }
    .artifact-doc .doc-stat-value {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.03em;
    }
    .artifact-doc .doc-stat-label {
      font-size: 0.58rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    /* Slide deck artifact */
    .artifact-slides {
      width: 100%;
      max-width: 780px;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .slide {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      aspect-ratio: 16 / 9;
      padding: 2.75rem 3.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08), 0 8px 40px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .slide::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent) 40%, var(--purple)));
    }
    .slide-number {
      position: absolute;
      bottom: 0.85rem;
      right: 1.25rem;
      font-size: 0.58rem;
      font-weight: 500;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }
    .slide-title {
      font-size: 1.4rem;
      font-weight: 650;
      color: var(--text);
      letter-spacing: -0.03em;
      line-height: 1.25;
      margin-bottom: 0.5rem;
    }
    .slide-subtitle {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: auto;
      line-height: 1.5;
    }
    .slide-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .slide-body h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 0.85rem;
    }
    .slide-body p {
      font-size: 0.78rem;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 0.5rem;
    }
    .slide-body ul {
      padding-left: 1.25rem;
      margin-bottom: 0.5rem;
    }
    .slide-body li {
      font-size: 0.78rem;
      color: var(--text-secondary);
      line-height: 1.9;
      margin-bottom: 0.15rem;
    }
    .slide-body li::marker { color: var(--text-muted); }
    .slide-body strong { color: var(--text); font-weight: 600; }
    .slide-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }
    .slide-col {
      padding: 0.75rem;
      background: var(--bg-soft);
      border-radius: 8px;
    }
    .slide-col h3 {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.5rem;
      padding-bottom: 0.35rem;
      border-bottom: 1px solid var(--border-subtle);
    }
    .slide-col p, .slide-col li {
      font-size: 0.72rem;
    }
    .slide-col ul {
      padding-left: 1rem;
    }
    .slide-big-number {
      font-size: 2.6rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 0.25rem;
    }
    .slide-big-label {
      font-size: 0.68rem;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .slide-stats {
      display: flex;
      gap: 2.5rem;
      margin-top: 1rem;
    }
    .slide-stat-item {
      text-align: center;
      flex: 1;
    }

    /* Spreadsheet artifact */
    .artifact-spreadsheet {
      width: 100%;
      max-width: 880px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08), 0 8px 40px rgba(0,0,0,0.18);
    }
    .sheet-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface) 70%, var(--bg));
    }
    .sheet-tab {
      padding: 0.45rem 1rem;
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--text-muted);
      border-right: 1px solid var(--border-subtle);
      cursor: pointer;
    }
    .sheet-tab.active {
      background: var(--surface);
      color: var(--text);
      font-weight: 600;
    }
    .sheet-grid {
      display: grid;
      font-size: 0.68rem;
      font-family: var(--font-mono);
    }
    .sheet-header-row {
      display: contents;
    }
    .sheet-header-row .sheet-cell {
      background: color-mix(in srgb, var(--surface) 60%, var(--bg));
      font-weight: 600;
      color: var(--text);
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      font-family: var(--font-body);
      position: sticky;
      top: 0;
    }
    .sheet-row {
      display: contents;
    }
    .sheet-row:hover .sheet-cell {
      background: color-mix(in srgb, var(--accent-bg-subtle) 50%, var(--surface));
    }
    .sheet-cell {
      padding: 0.45rem 0.75rem;
      border-bottom: 1px solid var(--border-subtle);
      border-right: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sheet-cell:last-child { border-right: none; }
    .sheet-cell.row-num {
      color: var(--text-muted);
      text-align: center;
      background: color-mix(in srgb, var(--surface) 60%, var(--bg));
      font-size: 0.58rem;
      min-width: 32px;
      font-family: var(--font-body);
    }
    .sheet-cell.num { text-align: right; font-variant-numeric: tabular-nums; }
    .sheet-cell.positive { color: var(--green); }
    .sheet-cell.negative { color: var(--red); }
    .sheet-cell.bold { font-weight: 600; color: var(--text); }
    .sheet-formula-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.35rem 0.65rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.62rem;
      color: var(--text-muted);
    }
    .sheet-formula-label {
      font-weight: 600;
      font-family: var(--font-mono);
      color: var(--text-secondary);
      background: color-mix(in srgb, var(--surface) 60%, var(--bg));
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
      border: 1px solid var(--border-subtle);
    }
    .sheet-formula-text {
      font-family: var(--font-mono);
      color: var(--text-muted);
    }

    /* Website artifact */
    .artifact-website {
      width: 100%;
      max-width: none;
      background: #141414;
      border: none;
      border-radius: 0;
      overflow: auto;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }
    /* Override workspace padding when showing website */
    .artifact-workspace:has(.artifact-website) {
      padding: 0;
    }
    .browser-chrome {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.6rem 0.85rem;
      background: color-mix(in srgb, var(--surface) 70%, var(--bg));
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .browser-dots {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .browser-dot {
      width: 11px; height: 11px;
      border-radius: 50%;
    }
    .browser-dot.red { background: #ff5f57; }
    .browser-dot.yellow { background: #febc2e; }
    .browser-dot.green { background: #28c840; }
    .browser-nav-btns {
      display: flex;
      gap: 2px;
      flex-shrink: 0;
    }
    .browser-nav-btn {
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none;
      color: var(--text-muted); cursor: default;
      border-radius: 4px;
      font-size: 0.75rem;
    }
    .browser-url {
      flex: 1;
      background: var(--bg-soft);
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      padding: 0.35rem 0.75rem;
      font-size: 0.65rem;
      font-family: var(--font-mono);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .browser-url-lock {
      font-size: 0.6rem;
      opacity: 0.5;
    }
    .browser-viewport {
      height: 540px;
      background: #141414;
      overflow: hidden;
    }
    .browser-viewport iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    /* Rendered website content — dark mode */
    .site-nav {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 0.65rem 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: #141414;
    }
    .site-nav-brand {
      font-size: 0.78rem;
      font-weight: 700;
      color: #e8e8e6;
      letter-spacing: -0.02em;
    }
    .site-nav-links {
      display: flex;
      gap: 1rem;
    }
    .site-nav-links a {
      font-size: 0.68rem;
      color: #777;
      text-decoration: none;
      font-weight: 500;
    }
    .site-hero {
      padding: 3.5rem 2.5rem;
      text-align: center;
      background: linear-gradient(135deg, #0d2626, #141414);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .site-hero h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #e8e8e6;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
    }
    .site-hero p {
      font-size: 0.82rem;
      color: #999;
      max-width: 420px;
      margin: 0 auto;
      line-height: 1.65;
    }
    .site-hero-btn {
      display: inline-block;
      margin-top: 1.25rem;
      padding: 0.55rem 1.4rem;
      background: #0a7a7a;
      color: #fff;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: 600;
      text-decoration: none;
      letter-spacing: -0.01em;
    }
    .site-features {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.5rem;
      padding: 2rem 1.5rem;
      background: #141414;
    }
    .site-feature {
      text-align: center;
      padding: 1.15rem 0.75rem;
      border-radius: 10px;
      transition: background 0.15s ease;
    }
    .site-feature:hover { background: rgba(255,255,255,0.03); }
    .site-feature-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: rgba(10,122,122,0.15);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 0.6rem;
      font-size: 1.1rem;
    }
    .site-feature h3 {
      font-size: 0.78rem;
      font-weight: 600;
      color: #e8e8e6;
      margin-bottom: 0.3rem;
    }
    .site-feature p {
      font-size: 0.65rem;
      color: #777;
      line-height: 1.55;
    }
    .site-section {
      padding: 2.5rem 2rem;
      background: #141414;
    }
    .site-section h2 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #e8e8e6;
      letter-spacing: -0.02em;
      margin-bottom: 0.3rem;
    }
    .site-section-sub {
      font-size: 0.78rem;
      color: #777;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .site-timeline {
      border-left: 2px solid rgba(255,255,255,0.08);
      margin-left: 0.5rem;
      padding-left: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .site-tl-item {
      position: relative;
    }
    .site-tl-item::before {
      content: '';
      position: absolute;
      left: -1.85rem;
      top: 0.35rem;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #0a7a7a;
      border: 2px solid #141414;
    }
    .site-tl-date {
      font-size: 0.62rem;
      font-weight: 600;
      color: #0a7a7a;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.2rem;
    }
    .site-tl-body {
      font-size: 0.75rem;
      color: #999;
      line-height: 1.65;
    }
    .site-tl-body strong { color: #e8e8e6; }
    .site-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.72rem;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      overflow: hidden;
    }
    .site-table th {
      text-align: left;
      font-weight: 600;
      color: #e8e8e6;
      padding: 0.6rem 0.75rem;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: 0.65rem;
    }
    .site-table td {
      padding: 0.55rem 0.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: #999;
    }
    .site-table td strong { color: #e8e8e6; font-weight: 600; }
    .site-table tr:last-child td { border-bottom: none; }
    .site-table tbody tr:hover td { background: rgba(255,255,255,0.03); }

    /* Canvas prompt bar */

      bottom: 0;
      left: 0;
      right: 0;

      flex-direction: column;
      align-items: center;
      z-index: 5;
      pointer-events: none;

    .canvas-view:has(.artifact-website) .canvas-prompt {

      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.55rem 0.65rem 0.55rem 1rem;
      max-width: 680px;
      width: 100%;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;

    .canvas-prompt-inner:focus-within {
      border-color: var(--border-base);
      box-shadow: 0 0 0 1px var(--border-soft);

    .canvas-prompt-input {
      flex: 1;
      background: none; border: none;
      font-family: var(--font-body);
      font-size: 0.82rem;

      letter-spacing: -0.01em;

    .canvas-prompt-send {

      display: flex; align-items: center; justify-content: center;
      background: var(--text); border: none; border-radius: 50%;
      cursor: pointer; transition: opacity 0.15s ease; flex-shrink: 0;
    }
    .canvas-prompt-send:hover { opacity: 0.8; }
    .canvas-prompt-send svg {
      width: 14px; height: 14px;
      stroke: var(--bg); fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    /* Selectable artifact elements */
    .artifact-selectable {
      cursor: pointer;
      position: relative;
      transition: outline 0.15s ease, outline-offset 0.15s ease;
      outline: 2px solid transparent;
      outline-offset: 2px;
      border-radius: 4px;
    }
    .artifact-selectable:hover {
      outline-color: color-mix(in srgb, var(--accent) 35%, transparent);
    }
    .artifact-selectable.selected {
      outline-color: var(--accent);
      background: var(--accent-bg-subtle);
    }
    /* Website version */
    .artifact-website .artifact-selectable:hover {
      outline-color: rgba(10,122,122,0.4);
    }
    .artifact-website .artifact-selectable.selected {
      outline-color: #0a7a7a;
      background: rgba(10,122,122,0.1);
    }

    /* Spreadsheet row selection — rows use display:contents so style cells */
    .sheet-row.artifact-selectable:hover .sheet-cell {
      outline: none;
      background: color-mix(in srgb, var(--accent) 8%, var(--surface));
    }
    .sheet-row.artifact-selectable.selected .sheet-cell {
      background: color-mix(in srgb, var(--accent) 14%, var(--surface));

    .sheet-row.artifact-selectable {
      outline: none;
    }

    /* Context chips above prompt */
    .canvas-prompt-context {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      max-width: 680px;
      width: 100%;
      margin-bottom: 0.4rem;

      display: none;
    }
    .context-chip {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      background: var(--accent-bg-subtle);
      border: 1px solid color-mix(in srgb, var(--accent) 20%, transparent);

      padding: 0.3rem 0.45rem 0.3rem 0.6rem;
      font-size: 0.62rem;
      color: var(--text-secondary);
      max-width: 280px;
      animation: chipIn 0.2s ease;
    }
    @keyframes chipIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .context-chip-label {
      font-weight: 600;
      color: var(--accent);
      flex-shrink: 0;
      font-size: 0.58rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .context-chip-text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }
    .context-chip-close {
      width: 16px; height: 16px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 3px;
      font-size: 0.65rem;
      flex-shrink: 0;
      transition: background 0.12s ease, color 0.12s ease;
    }
    .context-chip-close:hover {
      background: color-mix(in srgb, var(--accent) 15%, transparent);
      color: var(--text);
    }

    /* Updating overlay with chain-of-thought */
    .artifact-updating {
      position: absolute;
      inset: 0;
      background: color-mix(in srgb, var(--bg) 70%, transparent);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .artifact-updating.active {
      opacity: 1;
      pointer-events: auto;
    }
    .artifact-updating-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      width: 340px;
      max-width: 90%;

      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.85rem;

      color: var(--accent);

      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text);

    .artifact-updating-steps {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
      margin-left: 0.15rem;
      padding-left: 1rem;
      border-left: 1.5px solid var(--border);

    .artifact-cot-step {
      font-size: 0.7rem;
      color: var(--text-muted);
      padding: 0.2rem 0;
      opacity: 0;
      transform: translateY(4px);

      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .artifact-cot-step.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .artifact-cot-step.active {
      color: var(--text-secondary);
    }
    .artifact-cot-step.completed {
      color: var(--text-muted);
      opacity: 0.5;

    .artifact-cot-icon {
      width: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .artifact-cot-icon .spinner-char {
      font-size: 0.62rem;
      color: var(--accent);
    }
    .artifact-cot-icon .check {
      font-size: 0.62rem;
      color: var(--green);
    }
    .artifact-updating-progress {
      margin-top: 0.85rem;
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      overflow: hidden;
    }
    .artifact-updating-progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 1px;
      width: 0%;
      transition: width 0.4s ease;
    }

    /* Artifact diff highlight */
    .artifact-changed {
      position: relative;
      animation: diffHighlight 2.5s ease forwards;
    }
    .artifact-changed::before {
      content: '';
      position: absolute;
      inset: -2px -4px;
      border-radius: 4px;
      background: var(--accent);
      opacity: 0;
      animation: diffGlow 2.5s ease forwards;
      pointer-events: none;
      z-index: -1;
    }
    @keyframes diffHighlight {
      0% { background: color-mix(in srgb, var(--accent) 15%, transparent); }
      70% { background: color-mix(in srgb, var(--accent) 8%, transparent); }
      100% { background: transparent; }
    }
    @keyframes diffGlow {
      0% { opacity: 0.12; }
      30% { opacity: 0.08; }
      100% { opacity: 0; }
    }

    /* Streaming text animation */
    .streaming-word {
      display: inline;
      animation: wordReveal 0.3s ease forwards;
    }
    @keyframes wordReveal {
      from { opacity: 0; filter: blur(4px); }
      to { opacity: 1; filter: blur(0); }
    }

    /* Empty / new task state */
    .conv-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);

    .conv-empty-sub {

    .new-task-suggestions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      max-width: 480px;
      width: 100%;
      margin-top: 0.5rem;
    }
    .new-task-suggestion {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      padding: 0.75rem 0.85rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.15s ease, background 0.15s ease;
      text-align: left;
    }
    .new-task-suggestion:hover {

      background: var(--surface-raised);
    }
    .new-task-suggestion-icon {
      width: 28px; height: 28px;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 0.85rem;
      background: var(--bg-soft);
    }
    .new-task-suggestion-body {
      flex: 1; min-width: 0;
    }
    .new-task-suggestion-title {
      font-size: 0.72rem;
      font-weight: 550;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 0.1rem;
    }
    .new-task-suggestion-desc {
      font-size: 0.6rem;
      color: var(--text-muted);
      line-height: 1.4;
    }

    /* --- Chat Input Bar --- */
    .chat-input-bar {
      padding: 1.5rem 1.25rem 0.85rem;
      display: flex;
      flex-direction: column;
      background: linear-gradient(to bottom, transparent, var(--surface) 40%);

      align-items: center;

    .model-badge {

      padding: 0.18rem 0.45rem;

      flex-shrink: 0;
      letter-spacing: 0.01em;

    .chat-input {

      background: none;
      border: none;
      font-family: var(--font-body);
      font-size: 0.82rem;
      color: var(--text);

    .chat-send {

      border: none; border-radius: 50%;
      cursor: pointer;
      transition: opacity 0.15s ease;
      flex-shrink: 0;

    .chat-send:hover { opacity: 0.8; }
    .chat-send svg {
      width: 14px; height: 14px;
      stroke: var(--bg); fill: none;

    }
    .chat-input-meta {

      border: 1px solid var(--border-subtle);

      padding: 0.08rem 0.3rem;

  </style>
</head>

          const filterBtn = e.target.closest('.pl-inbox-filter');
          if (filterBtn) {
            inboxEl.querySelectorAll('.pl-inbox-filter').forEach(b => b.classList.remove('active'));
            filterBtn.classList.add('active');
            const filter = filterBtn.textContent.trim().toLowerCase();
            inboxEl.querySelectorAll('.pl-inbox-item').forEach(item => {
              if (filter === 'all') {
                item.style.display = '';
              } else {
                const taskId = item.dataset.taskId;
                const task = findTask(taskId);
                const match = task && (
                  (filter === 'running' && task.status === 'running') ||
                  (filter === 'completed' && task.status === 'completed') ||
                  (filter === 'queued' && (task.status === 'queued' || task.status === 'new'))
                );
                item.style.display = match ? '' : 'none';
              }
            });
            return;
          }

          // Task click
          const item = e.target.closest('.pl-inbox-item');
          if (!item) return;
          const taskId = item.dataset.taskId;
          activeTabId = taskId;
          setViewMode('workspace');
          renderSidebar();
          renderTabs();
          renderConversation();
        };
        return;
      }

      // Project mode: show columns layout
      if (colsEl) colsEl.style.display = '';
      const inboxEl = document.getElementById('pl-inbox-container');
      if (inboxEl) inboxEl.innerHTML = '';

      if (tasksToShow.length === 0) {
        tasksEl.innerHTML = '<div class="pl-empty">No tasks yet — type below to create one</div>';
      } else {
        tasksEl.innerHTML = tasksToShow.map(({ task, projectName }) => {
          let icon = '';
          if (task.status === 'running') icon = '<span class="spinner-char">\u280B</span>';
          else if (task.status === 'completed') icon = '<span class="check-icon">\u2713</span>';
          else if (task.status === 'new') icon = '<span class="new-dot"></span>';
          else icon = '<span class="queued-dot"></span>';

          let metaParts = [];
          if (task.status === 'running' && task.startTime) {
            metaParts.push(formatTime(Date.now() - task.startTime));
          } else if (task.status === 'completed') {
            const srcCount = task.messages.filter(m => m.type === 'sources').reduce((s, m) => s + m.items.length, 0);
            if (srcCount > 0) metaParts.push(srcCount + ' sources');
          } else if (task.status === 'queued') {
            metaParts.push('Queued');
          }
          const meta = metaParts.join(' · ');

          return `<div class="pl-task" data-task-id="${task.id}">
            <div class="pl-task-icon">${icon}</div>
            <div class="pl-task-body">
              <div class="pl-task-name">${task.name}</div>
              ${meta ? '<div class="pl-task-meta">' + meta + '</div>' : ''}
            </div>
          </div>`;
        }).join('');
