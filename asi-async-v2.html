    function renderProjectWidgets(project) {
      const el = document.getElementById('pl-widgets');
      const widgets = PROJECT_WIDGETS[project.id];
      if (!widgets || widgets.length === 0) {
        el.innerHTML = '';
        el.style.display = 'none';
        return;
      }
      el.style.display = '';

      el.innerHTML = widgets.map(w => {
        let body = '';
        const badgeClass = w.badge || 'scheduled';

        if (w.type === 'donut') {
          const circ = 2 * Math.PI * 30;
          let offset = 0;
          const circles = w.segments.map(seg => {
            const len = (seg.pct / 100) * circ;
            const html = `<circle stroke="${seg.color}" stroke-dasharray="${len} ${circ - len}" stroke-dashoffset="${-offset}" opacity="0.85"/>`;
            offset += len;
            return html;
          }).join('');
          const legend = w.segments.map(seg =>
            `<div class="pl-donut-legend-item"><span class="pl-donut-legend-dot" style="background:${seg.color};"></span>${seg.label}<span class="pl-donut-legend-val">${seg.value}</span></div>`
          ).join('');
          body = `<div class="pl-donut-wrap">
            <div class="pl-donut">
              <svg viewBox="0 0 72 72"><circle stroke="var(--border)" opacity="0.3"/>${circles}</svg>
              <div class="pl-donut-center">${w.center}</div>
            </div>
            <div class="pl-donut-legend">${legend}</div>
          </div>`;
        }

        else if (w.type === 'area') {
          const pts = w.points;
          const max = Math.max(...pts);
          const min = Math.min(...pts) * 0.8;
          const range = max - min || 1;
          const h = 48;
          const stepX = 100 / (pts.length - 1);
          const linePoints = pts.map((v, i) => `${i * stepX},${h - ((v - min) / range) * h}`).join(' ');
          const areaPoints = linePoints + ` 100,${h} 0,${h}`;
          body = `<div style="display:flex;align-items:baseline;gap:0.5rem;"><div class="pl-widget-value" style="font-size:1.1rem;">${w.current}</div><span class="pl-widget-change ${w.changeDir}" style="font-size:0.6rem;">${w.change}</span></div>
            <div class="pl-area-chart"><svg viewBox="0 0 100 ${h}" preserveAspectRatio="none">
              <polygon points="${areaPoints}" fill="${w.color}" opacity="0.12"/>
              <polyline points="${linePoints}" fill="none" stroke="${w.color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
            </svg></div>`;
        }

        else if (w.type === 'stacked-bar') {
          body = '<div class="pl-mini-bars">' + w.bars.map(bar => {
            const segs = bar.segments.map(s => `<div class="pl-mini-bar-seg" style="width:${s.pct}%;background:${s.color};"></div>`).join('');
            return `<div class="pl-mini-bar-row">
              <span class="pl-mini-bar-label">${bar.label}</span>
              <div class="pl-mini-bar-track">${segs}</div>
              <span class="pl-mini-bar-val">${bar.total}</span>
            </div>`;
          }).join('') + '</div>';
        }

        else if (w.type === 'heatmap') {
          const cells = w.cells.map((v, i) =>
            `<div class="pl-heatmap-cell" style="background:${w.color};opacity:${0.15 + v * 0.75};" data-label="${w.labels[i]}"></div>`
          ).join('');
          body = `<div class="pl-heatmap">${cells}</div>
            <div class="pl-widget-sub" style="margin-top:0.4rem;">${w.sub}</div>`;
        }

        else if (w.type === 'activity') {
          body = '<div class="pl-widget-log">' + w.items.map(item =>
            `<div class="pl-log-item">
              <span class="pl-log-time">${item.time}</span>
              <span class="pl-log-dot" style="background:${item.color};"></span>
              <span class="pl-log-text">${item.text}</span>
            </div>`
          ).join('') + '</div>';
        }

        else if (w.type === 'ticker') {
          body = '<div class="pl-ticker-list">' + w.items.map(item =>
            `<div class="pl-ticker-row">
              <span class="pl-ticker-name">${item.name}</span>
              <div class="pl-ticker-bar-wrap"><div class="pl-ticker-bar" style="width:${item.pct}%;background:${item.color};"></div></div>
              <span class="pl-ticker-val">${item.value}</span>
            </div>`
          ).join('') + '</div>';
        }

        return `<div class="pl-widget" ${w.taskId ? 'data-task-id="' + w.taskId + '"' : ''}>
          <div class="pl-widget-header">
            <span class="pl-widget-title">${w.title}</span>
            <span class="pl-widget-badge ${badgeClass}">${w.badgeText || ''}</span>
          </div>
          ${body}
        </div>`;
      }).join('');
    }

                <div class="new-task-suggestion-desc">TAM analysis, growth projections, and segmentation</div>
              </div>

          </div>
        </div>`;
        setTimeout(() => {
          const input = document.getElementById('chat-input');
          if (input) { input.placeholder = 'Describe your task...'; input.focus(); }
        }, 50);

      if (task.messages.length === 0) {
        el.innerHTML = `<div class="conv-empty-start">

          <div class="conv-empty-sub">This task is waiting for capacity. It will start automatically when a slot opens up.</div>
        </div>`;
        return;
      }

      el.innerHTML = task.messages.map((msg, idx) => {
        const msgId = `msg-${task.id}-${idx}`;
        if (msg.type === 'user') {
          return `<div class="msg msg-user">
            <div class="msg-user-label"><span class="msg-user-avatar">G</span> You</div>
            <div class="msg-user-text">${msg.text}</div>
          </div>`;
        }
        if (msg.type === 'thinking') {
          const isDone = msg.done;
          const isExpanded = !msg.collapsed;
          const agLabel = msg.label || 'Research';
          const agTask = isDone ? (msg.task || msg.lines.length + ' steps completed') : (msg.task || 'Processing\u2026');

          const stepsHtml = msg.lines.map((l, li) => {
            const isCompleted = isDone || (msg.streaming && li < msg.lines.length - 1);
            return `<div class="ag-step visible${isCompleted ? ' completed' : ''}"><span class="ag-step-spinner-wrap"><span class="loader text-spinner sm" data-spinner="braille" style="font-size:0.65rem; color: var(--text-muted); width:12px; height:12px;"></span></span><span class="ag-step-check">&#x2713;</span><span class="ag-step-text">${l}</span></div>`;
          }).join('');

          return `<div class="msg"><div class="agent-group visible${isDone ? ' completed' : ''}${isExpanded ? ' expanded' : ''}" data-msg-idx="${idx}">
            <div class="agent-group-header" onclick="toggleThinking(this, ${idx})">
              <span class="ag-spinner-wrap"><span class="loader text-spinner sm" data-spinner="braille" style="font-size:0.8rem; color: var(--text-muted); width:16px; height:16px;"></span></span>

              <span class="ag-label">${agLabel}</span>
              <span class="ag-task">${agTask}</span>
              <svg class="ag-chevron" viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
            </div>
            <div class="agent-group-body"><div class="agent-group-body-inner">${stepsHtml}</div></div>
          </div></div>`;
        }
        if (msg.type === 'assistant') {
          return `<div class="msg msg-assistant">
            <div class="msg-assistant-label">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
              Assistant
            </div>
            <div class="msg-assistant-text">${msg.html}</div>
          </div>`;
        }
        if (msg.type === 'sources') {
          const cardsHtml = msg.items.map((s, si) => {
            const domain = s.url.split('/')[0];
            const initial = domain.charAt(0).toUpperCase();
            return `<div class="source-card">
              <div class="source-card-header">
                <span class="source-card-favicon">${initial}</span>

            </div>`;
          }).join('');
          return `<div class="msg msg-sources">
            <div class="sources-label"><svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg> ${msg.items.length} Sources</div>
            <div class="sources-grid">${cardsHtml}</div>

        if (msg.type === 'artifact') {
          const lineCount = msg.content.split('\n').length;
          return `<div class="msg msg-artifact">
            <div class="artifact-card">
              <div class="artifact-header">
                <div class="artifact-icon-wrap"><svg class="artifact-icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>

              </div>
              <div class="artifact-preview" style="position:relative;">${msg.content}<div class="artifact-fade"></div></div>
            </div>
          </div>`;
        }
        return '';

    // Chat submit
    function submitChat() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      input.placeholder = 'Ask a follow-up...';

      const task = findTask(activeTabId);
      if (!task) return;

      // If this is a brand-new task, kick it off
      if (task.status === 'new') {
        task.status = 'running';
        task.startTime = Date.now();
        task.name = text.length > 50 ? text.slice(0, 47) + '...' : text;
        task.messages.push({ type: 'user', text: text });
        task.messages.push({
          type: 'thinking',
          label: 'Research',
          task: 'Initializing research pipeline',
          lines: ['Initializing research pipeline', 'Identifying relevant data sources'],
          collapsed: false,
          done: false,
          streaming: true,
        });
        renderSidebar();
        renderTabs();
        renderConversation();
        return;
      }

      // Add user message
      task.messages.push({ type: 'user', text: text });
      renderConversation();

      // Simulate thinking
      setTimeout(() => {
        const thinkingMsg = {
          type: 'thinking',
          label: 'Research',
          task: 'Processing follow-up',
          lines: ['Processing your follow-up question'],
          collapsed: false,
          done: false,
          streaming: true,
        };
        task.messages.push(thinkingMsg);
        renderConversation();

        // Add thinking steps over time
        const thinkingLines = [
          'Searching for relevant information',
          'Cross-referencing with existing findings',
          'Synthesizing updated analysis',
        ];
        let lineIdx = 0;
        const thinkInterval = setInterval(() => {
          if (lineIdx < thinkingLines.length) {
            thinkingMsg.lines.push(thinkingLines[lineIdx]);
            lineIdx++;
            if (task.id === activeTabId) renderConversation();
          } else {
            clearInterval(thinkInterval);
            // Complete thinking, add response
            thinkingMsg.done = true;
            thinkingMsg.collapsed = true;
            thinkingMsg.streaming = false;
            task.messages.push({
              type: 'assistant',
              html: '<p>Based on the additional context, I\'ve updated my analysis. The key factors you mentioned align with the trends I\'m seeing in the data. Let me continue refining the findings and I\'ll have a more comprehensive update shortly.</p>',
            });
            if (task.id === activeTabId) renderConversation();
          }
        }, 1200);
      }, 500);
    }

    document.getElementById('chat-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); submitChat(); }
    });

    // =============================================
    // ARTIFACT WORKSPACE
    // =============================================
    function getArtifactForTask(taskId) {
      return ARTIFACTS[taskId] || null;
    }

    function renderArtifact() {
      // Find the best artifact to show — prefer active tab, fall back to first completed task with an artifact
      let artifact = getArtifactForTask(activeTabId);
      if (!artifact) {
        for (const id of Object.keys(ARTIFACTS)) {
          artifact = ARTIFACTS[id];
          currentArtifactId = id;
          break;
        }
      } else {
        currentArtifactId = activeTabId;
      }

      if (!artifact) return;

      document.getElementById('artifact-toolbar-title').textContent = artifact.title;
      updateVersionUI(artifact);

      const docEl = document.getElementById('artifact-doc');
      docEl.className = '';
      const containerMap = {
        'doc': 'artifact-doc',
        'slides': 'artifact-slides',
        'spreadsheet': 'artifact-spreadsheet',
        'website': 'artifact-website',
      };
      docEl.classList.add(containerMap[artifact.container] || 'artifact-doc');
      docEl.innerHTML = artifact.versions[artifact.currentVersion];

      // Clear context chips on artifact switch
      contextSelections = [];
      renderContextChips();

      // Make elements selectable
      setupArtifactSelection(docEl);
    }

    function updateVersionUI(artifact) {
      const total = artifact.versions.length;
      const current = artifact.currentVersion;
      document.getElementById('artifact-ver-label').textContent = 'v' + (current + 1) + ' / ' + total;
      document.getElementById('artifact-ver-prev').disabled = current <= 0;
      document.getElementById('artifact-ver-next').disabled = current >= total - 1;
    }

    // Version navigation
    document.getElementById('artifact-ver-prev').addEventListener('click', () => {
      const artifact = ARTIFACTS[currentArtifactId];
      if (!artifact || artifact.currentVersion <= 0) return;
      artifact.currentVersion--;
      renderArtifact();
    });
    document.getElementById('artifact-ver-next').addEventListener('click', () => {
      const artifact = ARTIFACTS[currentArtifactId];
      if (!artifact || artifact.currentVersion >= artifact.versions.length - 1) return;
      artifact.currentVersion++;
      renderArtifact();
    });

    // =============================================
    // ARTIFACT ELEMENT SELECTION
    // =============================================
    let contextSelections = []; // { id, label, text, el }

    function setupArtifactSelection(root) {
      // Tag selectable elements: paragraphs, list items, table rows, headings, stat cards, callouts, slides, timeline items, enforcement cards, feature cards
      const selectors = [
        'p', 'li', 'h2', 'h3',
        '.doc-stat', '.doc-callout', '.doc-table tr:not(:first-child)',
        '.slide', '.slide-col',
        '.sheet-row',
        '.site-feature', '.site-tl-item', '.site-enforcement-card',
        '.site-section h2', '.site-table tr:not(:first-child)',
      ];

      let selectId = 0;
      selectors.forEach(sel => {
        root.querySelectorAll(sel).forEach(el => {
          // Skip if already inside a selectable (avoid double-tagging)
          if (el.closest('.artifact-selectable')) return;
          el.classList.add('artifact-selectable');
          el.dataset.selectId = 'sel-' + (selectId++);
        });
      });
    }

    function getElementLabel(el) {
      const tag = el.tagName.toLowerCase();
      if (el.classList.contains('doc-stat')) return 'Stat';
      if (el.classList.contains('doc-callout')) return 'Callout';
      if (el.classList.contains('slide')) return 'Slide';
      if (el.classList.contains('slide-col')) return 'Column';
      if (el.classList.contains('sheet-row')) return 'Row';
      if (el.classList.contains('site-feature')) return 'Feature';
      if (el.classList.contains('site-tl-item')) return 'Event';
      if (el.classList.contains('site-enforcement-card')) return 'Card';
      if (tag === 'tr') return 'Row';
      if (tag === 'h2' || tag === 'h3') return 'Heading';
      if (tag === 'li') return 'Item';
      if (tag === 'p') return 'Paragraph';
      return 'Element';
    }

    function getElementText(el) {
      return (el.textContent || '').replace(/\s+/g, ' ').trim().slice(0, 80);
    }

    function renderContextChips() {
      const container = document.getElementById('canvas-prompt-context');
      container.innerHTML = contextSelections.map(s =>
        `<div class="context-chip" data-select-id="${s.id}">
          <span class="context-chip-label">${s.label}</span>
          <span class="context-chip-text">${s.text}</span>
          <button class="context-chip-close" data-remove-id="${s.id}">&times;</button>
        </div>`
      ).join('');

      // Update placeholder
      const input = document.getElementById('canvas-prompt-input');
      if (contextSelections.length > 0) {
        input.placeholder = 'What should I change about ' + (contextSelections.length === 1 ? 'this' : 'these') + '?';
      } else {
        input.placeholder = 'Iterate on this artifact...';
      }
    }

    // Click handler for artifact element selection
    document.getElementById('artifact-doc').addEventListener('click', (e) => {
      const selectable = e.target.closest('.artifact-selectable');
      if (!selectable) return;
      e.preventDefault();
      e.stopPropagation();

      const id = selectable.dataset.selectId;
      const existing = contextSelections.findIndex(s => s.id === id);

      if (existing >= 0) {
        // Deselect
        contextSelections.splice(existing, 1);
        selectable.classList.remove('selected');
      } else {
        // Select
        contextSelections.push({
          id: id,
          label: getElementLabel(selectable),
          text: getElementText(selectable),
          el: selectable,
        });
        selectable.classList.add('selected');
      }

      renderContextChips();
      document.getElementById('canvas-prompt-input').focus();
    });

    // Remove chip handler
    document.getElementById('canvas-prompt-context').addEventListener('click', (e) => {
      const btn = e.target.closest('.context-chip-close');
      if (!btn) return;
      const id = btn.dataset.removeId;

      // Remove from selections
      const idx = contextSelections.findIndex(s => s.id === id);
      if (idx >= 0) {
        // Deselect the element in the artifact
        const el = contextSelections[idx].el;
        if (el) el.classList.remove('selected');
        contextSelections.splice(idx, 1);
      }
      renderContextChips();
    });

    // Canvas prompt submit
    function submitCanvasPrompt() {
      const input = document.getElementById('canvas-prompt-input');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';

      const selectedCount = contextSelections.length;
      const selectedIds = contextSelections.map(s => s.id);

      // Clear selections
      contextSelections.forEach(s => { if (s.el) s.el.classList.remove('selected'); });
      contextSelections = [];
      renderContextChips();

      // Build contextual chain-of-thought steps
      const cotSteps = [];
      if (selectedCount > 0) {
        cotSteps.push('Reading ' + selectedCount + ' selected element' + (selectedCount > 1 ? 's' : ''));
      }
      cotSteps.push('Parsing edit instruction');

      // Add steps based on the prompt content
      const lower = text.toLowerCase();
      if (lower.includes('table') || lower.includes('data') || lower.includes('row') || lower.includes('column')) {
        cotSteps.push('Restructuring data layout');
        cotSteps.push('Reformatting table cells');
      } else if (lower.includes('add') || lower.includes('section') || lower.includes('include')) {
        cotSteps.push('Generating new content');
        cotSteps.push('Inserting into document structure');
      } else if (lower.includes('style') || lower.includes('color') || lower.includes('font') || lower.includes('design')) {
        cotSteps.push('Adjusting visual styles');
        cotSteps.push('Validating accessibility contrast');
      } else if (lower.includes('remove') || lower.includes('delete') || lower.includes('hide')) {
        cotSteps.push('Identifying elements to remove');
        cotSteps.push('Cleaning up surrounding layout');
      } else if (lower.includes('rewrite') || lower.includes('rephrase') || lower.includes('tone') || lower.includes('change')) {
        cotSteps.push('Analyzing current content tone');
        cotSteps.push('Rewriting selected passages');
      } else {
        cotSteps.push('Analyzing artifact structure');
        cotSteps.push('Generating modifications');
      }
      cotSteps.push('Validating output');
      cotSteps.push('Applying changes');

      // Show overlay
      const overlay = document.getElementById('artifact-updating');
      const stepsEl = document.getElementById('artifact-updating-steps');
      const progressBar = document.getElementById('artifact-updating-progress');
      const titleEl = document.getElementById('artifact-updating-title');

      titleEl.textContent = 'Editing artifact...';
      stepsEl.innerHTML = '';
      progressBar.style.width = '0%';
      overlay.classList.add('active');

      // Animate steps one by one
      let stepIdx = 0;
      const stepDelay = 700;
      const totalDuration = cotSteps.length * stepDelay + 600;

      function showNextStep() {
        if (stepIdx >= cotSteps.length) return;

        // Mark previous step as completed
        if (stepIdx > 0) {
          const prev = stepsEl.children[stepIdx - 1];
          if (prev) {
            prev.classList.remove('active');
            prev.classList.add('completed');
            prev.querySelector('.artifact-cot-icon').innerHTML = '<span class="check">&#x2713;</span>';
          }
        }

        // Add new step
        const stepEl = document.createElement('div');
        stepEl.className = 'artifact-cot-step';
        stepEl.innerHTML = '<span class="artifact-cot-icon"><span class="spinner-char">\u280B</span></span><span>' + cotSteps[stepIdx] + '</span>';
        stepsEl.appendChild(stepEl);

        // Animate in
        requestAnimationFrame(() => {
          stepEl.classList.add('visible', 'active');
        });

        // Update progress
        progressBar.style.width = Math.round(((stepIdx + 1) / cotSteps.length) * 100) + '%';

        stepIdx++;
        if (stepIdx < cotSteps.length) {
          setTimeout(showNextStep, stepDelay);
        } else {
          // Complete last step after a beat
          setTimeout(() => {
            const last = stepsEl.children[stepsEl.children.length - 1];
            if (last) {
              last.classList.remove('active');
              last.classList.add('completed');
              last.querySelector('.artifact-cot-icon').innerHTML = '<span class="check">&#x2713;</span>';
            }
            progressBar.style.width = '100%';
            titleEl.textContent = 'Done';

            // Dismiss after a moment
            setTimeout(() => {
              const artifact = ARTIFACTS[currentArtifactId];
              if (artifact) {
                // Clone current HTML as new version (in real use, AI would return new HTML)
                const currentHtml = artifact.versions[artifact.currentVersion];
                artifact.versions.push(currentHtml);
                artifact.currentVersion = artifact.versions.length - 1;
                updateVersionUI(artifact);
              }
              overlay.classList.remove('active');

              // Highlight the elements the user selected (or random if none)
              highlightArtifactChanges(selectedIds);
            }, 500);
          }, stepDelay);
        }
      }

      // Kick off after a short delay
      setTimeout(showNextStep, 300);
    }

    function highlightArtifactChanges(selectedIds) {
      const docEl = document.getElementById('artifact-doc');
      if (!docEl) return;

      // Clear any existing highlights
      docEl.querySelectorAll('.artifact-changed').forEach(el => el.classList.remove('artifact-changed'));

      let targets = [];

      // If user had selected specific elements, highlight those
      if (selectedIds && selectedIds.length > 0) {
        selectedIds.forEach(id => {
          const el = docEl.querySelector(`[data-select-id="${id}"]`);
          if (el) targets.push(el);
        });
      }

      // Fallback: pick random elements if nothing was selected
      if (targets.length === 0) {
        const candidates = Array.from(docEl.querySelectorAll(
          'p, li, h2, h3, td, .doc-stat, .doc-callout, .slide-col, .sheet-row, .site-feature, .site-tl-item, .site-enforcement-card'
        ));
        if (candidates.length === 0) return;
        const count = Math.min(candidates.length, 3 + Math.floor(Math.random() * 4));
        const indices = new Set();
        while (indices.size < count) {
          indices.add(Math.floor(Math.random() * candidates.length));
        }
        indices.forEach(idx => targets.push(candidates[idx]));
      }

      // Stagger the highlights
      let delay = 0;
      targets.forEach(el => {
        setTimeout(() => {
          el.classList.add('artifact-changed');
        }, delay);
        delay += 120;
      });

      // Auto-remove after animation completes
      setTimeout(() => {
        docEl.querySelectorAll('.artifact-changed').forEach(el => el.classList.remove('artifact-changed'));
      }, 3500);
    }

    document.getElementById('canvas-prompt-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); submitCanvasPrompt(); }
    });
    document.getElementById('canvas-prompt-send').addEventListener('click', submitCanvasPrompt);

    // =============================================
    // ANIMATION ENGINE
    // =============================================
    let lastCoarseTick = 0;

    function masterLoop(ts) {
      // Spinner frame update (~80ms)
      if (ts - (masterLoop._lastSpinner || 0) > 80) {
        masterLoop._lastSpinner = ts;
        spinnerIdx = (spinnerIdx + 1) % SPINNER_FRAMES.length;
        document.querySelectorAll('.spinner-char').forEach(el => {
          el.textContent = SPINNER_FRAMES[spinnerIdx];
        });
      }

      // Coarse tick every ~2s
      if (ts - lastCoarseTick > 2000) {
        lastCoarseTick = ts;
        coarseTick();
      }

      requestAnimationFrame(masterLoop);
    }

    function coarseTick() {
      const allTasks = getAllTasks();
      let needsRender = false;

      allTasks.forEach(task => {
        if (task.status === 'running') {
          // Occasionally add new thinking steps to streaming thinking blocks
          const lastMsg = task.messages[task.messages.length - 1];
          if (lastMsg && lastMsg.type === 'thinking' && lastMsg.streaming && !lastMsg.done) {
            if (Math.random() < 0.35 && lastMsg.lines.length < 8) {
              const actions = [
                'Analyzing additional data points from secondary sources',
                'Cross-referencing findings with government databases',
                'Verifying statistical claims against primary datasets',
                'Extracting key findings and confidence intervals',
                'Comparing against 5-year historical baselines',
                'Evaluating source credibility and publication date',
                'Building structured data table from unstructured reports',
                'Processing batch of 12 PDF documents',
                'Running comparative analysis across regions',
                'Calculating compound growth projections through 2028',
                'Flagging contradictory data between sources',
                'Normalizing units and currency for cross-region comparison',
                'Scraping supplementary data from industry association reports',
                'Validating findings against peer-reviewed literature',
              ];
              lastMsg.lines.push(actions[Math.floor(Math.random() * actions.length)]);
              if (task.id === activeTabId) needsRender = true;
            }
          }

          // Randomly complete a running task's thinking and add response
          if (Math.random() < 0.02) {
            completeTaskThinking(task);
            needsRender = true;
          }
        }

        // Start queued tasks
        if (task.status === 'queued') {
          if (Math.random() < 0.015) {
            startTask(task);
            needsRender = true;
          }
        }
      });

      // Update sidebar timers
      renderSidebar();


      if (viewMode === 'workspace' && needsRender) {
        renderConversation();
      }
      if (viewMode === 'canvas') {
        // Artifact view doesn't need periodic re-renders
      }
    }

    function startTask(task) {
      task.status = 'running';
      task.startTime = Date.now();
      task.messages = [
        { type: 'user', text: getDefaultPrompt(task.id) },
        { type: 'thinking', label: 'Research', task: 'Initializing research pipeline', lines: ['Initializing research pipeline', 'Identifying relevant data sources'], collapsed: false, done: false, streaming: true },
      ];
    }

    function getDefaultPrompt(taskId) {
      const prompts = {
        'eu-dma': 'Analyze the EU Digital Markets Act: key provisions, designated gatekeepers, compliance requirements, and enforcement actions to date.',
        'semiconductor': 'Provide an outlook for the semiconductor industry in 2025. Cover TSMC, Samsung, Intel, and the impact of AI chip demand.',
        'vertical-saas': 'Map the vertical SaaS landscape. Identify top companies in healthcare, legal, construction, and restaurant tech.',
      };
      return prompts[taskId] || 'Research and analyze this topic comprehensively.';
    }

    function completeTaskThinking(task) {
      const lastMsg = task.messages[task.messages.length - 1];
      if (!lastMsg || lastMsg.type !== 'thinking' || lastMsg.done) return;

      lastMsg.done = true;
      lastMsg.collapsed = true;
      lastMsg.streaming = false;

      // Add a contextual response
      const responses = [
        '<p><strong>Progress update:</strong> I\'ve processed 18 sources so far and the data is converging. Key patterns are emerging:</p><ul><li>Market concentration is increasing — top 3 players now control 64% of volume, up from 51% two years ago</li><li>Pricing pressure is most acute in the mid-tier segment</li><li>Geographic expansion is the primary growth vector for incumbents</li></ul><p>Continuing to verify these figures against primary datasets.</p>',
        '<p><strong>Interim findings:</strong> The data reveals more regional divergence than expected. Three distinct patterns are forming:</p><ul><li><strong>Mature markets</strong> (US, EU, Japan) — slowing growth but deepening adoption, driven by enterprise contracts</li><li><strong>High-growth markets</strong> (SE Asia, LATAM, India) — 40-120% YoY growth from a low base, price-sensitive segments</li><li><strong>Policy-driven markets</strong> (China, UAE, Singapore) — government mandates and subsidies shaping adoption curves</li></ul><p>I\'m now building the comparative framework to quantify these patterns.</p>',
        '<p><strong>Initial analysis complete.</strong> I\'ve validated the primary data and can share high-confidence findings:</p><p>The market grew <strong>23% YoY</strong> overall, but this headline number masks significant variance. The fastest-growing sub-segments are outpacing the market by 3-5x, while legacy categories are contracting. I\'m now pulling secondary sources to build out the full competitive landscape.</p>',
        '<p><strong>Source validation complete.</strong> After cross-referencing 12 primary sources, the data quality is high — only 2 conflicting data points which I\'ve flagged for review.</p><p>Key takeaway so far: the structural shift everyone has been discussing is real, but the timeline is approximately 18 months behind most analyst projections. I\'m synthesizing the complete findings now.</p>',
      ];

      task.messages.push({
        type: 'assistant',
        html: responses[Math.floor(Math.random() * responses.length)],
      });

      // Sometimes add a new thinking block to continue
      if (Math.random() < 0.6) {
        setTimeout(() => {
          const continuations = [
            { label: 'Verification', task: 'Cross-checking findings against secondary sources' },
            { label: 'Deep Dive', task: 'Expanding analysis on high-impact segments' },
            { label: 'Synthesis', task: 'Building structured output from validated findings' },
            { label: 'Data Enrichment', task: 'Adding supplementary context from industry reports' },
          ];
          const cont = continuations[Math.floor(Math.random() * continuations.length)];
          task.messages.push({
            type: 'thinking',
            label: cont.label,
            task: cont.task,
            lines: [cont.task],
            collapsed: false,
            done: false,
            streaming: true,
          });
          if (task.id === activeTabId) renderConversation();
        }, 3000);
      } else {
        // Complete the task
        setTimeout(() => {
          task.status = 'completed';
          task.messages.push({
            type: 'sources',
            items: [
              { title: 'Primary Research Database', url: 'research.data/primary', snippet: 'Comprehensive dataset covering the analysis period with verified statistics.' },
              { title: 'Industry Analysis Report', url: 'industry.report/2024', snippet: 'Detailed market analysis with forward projections and competitive landscape.' },
            ],
          });
          renderSidebar();
          renderTabs();
          if (task.id === activeTabId) renderConversation();
        }, 4000);
      }
    }

    // =============================================
    // INIT
    // =============================================
    getTasksInbox(); // ensure inbox is prefilled
    renderSidebar();
    renderTabs();
    renderConversation();
    if (typeof startAllSpinners === 'function') startAllSpinners();
    requestAnimationFrame(masterLoop);

  </script>
</body>
